name: firmware

on:
  push:
    branches: [main]
    paths: ['firmware/**', '.github/workflows/firmware.yml']
  pull_request:
    paths: ['firmware/**', '.github/workflows/firmware.yml']

jobs:
  mvp:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.2
    steps:
      - uses: actions/checkout@v4
      - name: Build MVP firmware
        run: |
          cd firmware/mvp
          . $IDF_PATH/export.sh
          idf.py set-target esp32c3
          idf.py build

  common-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential
      - name: Configure
        run: cmake -S firmware/common -B firmware/common/build
      - name: Build
        run: cmake --build firmware/common/build
      - name: Test
        run: cd firmware/common/build && ctest --output-on-failure
