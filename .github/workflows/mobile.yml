name: mobile

on:
  push:
    branches: [main]
    paths: ['mobile/**', '.github/workflows/mobile.yml']
  pull_request:
    paths: ['mobile/**', '.github/workflows/mobile.yml']

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install
        run: cd mobile && pnpm install --frozen-lockfile
      - name: Typecheck
        run: cd mobile && pnpm typecheck
      - name: Lint
        run: cd mobile && pnpm lint
      - name: Unit tests
        run: cd mobile && pnpm test
